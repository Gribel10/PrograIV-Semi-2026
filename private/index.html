                        <li class="nav-item">
                            <a class="nav-link" href="#" @click.prevent="abrirVentana('alumnos')">Alumnos</a>

            <docentes v-show="forms.docentes.mostrar" :forms="forms" ref="docentes"></docentes>

            <matriculas v-show="forms.matriculas.mostrar" :forms="forms" ref="matriculas"></matriculas>
            
            <!-- Inscripciones -->
